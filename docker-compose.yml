# ===============================================
# CheckinKit (Greet) Docker Compose
# ===============================================
#
# Quick Start:
#   1. cp .env.example .env  (then fill in values)
#   2. docker compose up db -d
#   3. docker compose --profile migrate run --rm migrate
#   4. docker compose up app -d
#
# View logs:
#   docker compose logs -f app
#
# Rebuild after code changes:
#   docker compose build app && docker compose up app -d
#

services:
  db:
    image: postgres:16-alpine
    container_name: checkmate-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: checkmate
      POSTGRES_USER: checkmate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-checkmate_local_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U checkmate -d checkmate"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: checkmate-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://checkmate:${POSTGRES_PASSWORD:-checkmate_local_dev}@db:5432/checkmate
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: checkmate-migrate
    environment:
      DATABASE_URL: postgresql://checkmate:${POSTGRES_PASSWORD:-checkmate_local_dev}@db:5432/checkmate
    depends_on:
      db:
        condition: service_healthy
    command: npx drizzle-kit push
    profiles:
      - migrate

volumes:
  postgres_data:

networks:
  default:
    name: checkmate-network
